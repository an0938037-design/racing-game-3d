<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Camera Racing Game</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="left-panel">
      <div id="webcam-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlay-canvas"></canvas>
      </div>
      <div id="hud">
        <div class="hud-row"><span class="hud-label">SPEED:</span><span id="hud-speed" class="hud-value">0</span></div>
        <div class="hud-row"><span class="hud-label">STEERING:</span><span id="hud-steering" class="hud-value">0°</span></div>
        <div class="hud-row"><span class="hud-label">ARM DIST:</span><span id="hud-armdist" class="hud-value">0.00</span></div>
        <div class="hud-row"><span class="hud-label">ACTION:</span><span id="hud-action" class="hud-value">STOP</span></div>
        <div class="hud-row"><span class="hud-label">FPS:</span><span id="hud-fps" class="hud-value">0</span></div>
        <div class="hud-row"><span class="hud-label">SCORE:</span><span id="hud-score" class="hud-value">0</span></div>
      </div>
      <div id="error-banner" class="hidden">PLAYER NOT DETECTED</div>
      <div id="init-banner">LOADING...</div>
    </div>
    <div id="right-panel">
      <div id="game-container"></div>
    </div>
  </div>
  <script src="pose.js"></script>
  <script src="controller.js"></script>
  <script src="game.js"></script>
  <script src="ui.js"></script>
  <script src="main.js"></script>
</body>
</html>
